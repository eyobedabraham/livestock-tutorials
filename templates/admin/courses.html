{% extends "base.html" %}
{% block title %}Manage Courses{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Courses</h2>
    <form method="post" action="{{ url_for('admin_add_course') }}" enctype="multipart/form-data" class="mb-4">
        <div class="row g-2">
            <div class="col-md-4"><input type="text" name="title" class="form-control" placeholder="Course title" required></div>
            <div class="col-md-3">
                <select name="category_id" class="form-select"><option value="">No category</option>
                {% for cat in categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor %}</select>
            </div>
            <div class="col-md-2"><input type="number" name="order" class="form-control" placeholder="Order" value="0"></div>
            <div class="col-md-3"><input type="file" name="image" class="form-control" accept="image/*"></div>
        </div>
        <textarea name="description" class="form-control mt-2" placeholder="Description"></textarea>
        <button type="submit" class="btn btn-success mt-2">Add Course</button>
    </form>
    <table class="table">
        <tr><th>Title</th><th>Category</th><th>Actions</th></tr>
        {% for c in courses %}
        <tr>
            <td>{{ c.title }}</td><td>{{ c.cat_name or '-' }}</td>
            <td>
                <a href="{{ url_for('admin_edit_course', course_id=c.id) }}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{{ url_for('admin_modules', course_id=c.id) }}" class="btn btn-sm btn-info">Modules</a>
                <a href="{{ url_for('admin_delete_course', course_id=c.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">← Back</a>
</div>
{% endblock %}
