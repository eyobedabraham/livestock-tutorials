{% extends "base.html" %}
{% block title %}Edit Course{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Edit Course</h2>
    <form method="post" enctype="multipart/form-data">
        <div class="mb-3"><input type="text" name="title" class="form-control" value="{{ course.title }}" required></div>
        <div class="mb-3">
            <select name="category_id" class="form-select">
                <option value="">No category</option>
                {% for cat in categories %}<option value="{{ cat.id }}" {% if cat.id == course.category_id %}selected{% endif %}>{{ cat.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="mb-3"><textarea name="description" class="form-control">{{ course.description or '' }}</textarea></div>
        <div class="mb-3"><input type="number" name="order" class="form-control" value="{{ course.order }}"></div>
        <div class="mb-3"><input type="file" name="image" class="form-control" accept="image/*"></div>
        {% if course.image %}<p>Current: <img src="{{ url_for('uploaded_file', filename=course.image) }}" height="80"></p>{% endif %}
        <button type="submit" class="btn btn-success">Update</button>
        <a href="{{ url_for('admin_courses') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
