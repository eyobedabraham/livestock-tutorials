{% extends "base.html" %}
{% block title %}Manage Categories{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Categories</h2>
    <form method="post" action="{{ url_for('admin_add_category') }}" class="row g-2 mb-3">
        <div class="col-auto"><input type="text" name="name" class="form-control" placeholder="New category" required></div>
        <div class="col-auto"><button type="submit" class="btn btn-success">Add</button></div>
    </form>
    <ul class="list-group">
        {% for cat in categories %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ cat.name }}
            <a href="{{ url_for('admin_delete_category', cat_id=cat.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">×</a>
        </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary mt-3">← Back</a>
</div>
{% endblock %}
